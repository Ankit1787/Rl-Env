services:
  environment:
    build:
      context: ./environment
      dockerfile: Dockerfile.prod
    env_file:
      - .env.production.example
    ports:
      - "${ENVIRONMENT_PORT:-3001}:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  viewer:
    build:
      context: ./viewer
      dockerfile: Dockerfile.prod
    env_file:
      - .env.production.example
    environment:
      NUXT_PUBLIC_ENVIRONMENT_BASE_URL: ${NUXT_PUBLIC_ENVIRONMENT_BASE_URL:-http://localhost:3001}
      NUXT_PUBLIC_TRAINER_BASE_URL: ${NUXT_PUBLIC_TRAINER_BASE_URL:-http://localhost:8000}
    ports:
      - "${VIEWER_PORT:-3000}:3000"
    depends_on:
      environment:
        condition: service_healthy
      trainer:
        condition: service_started

  trainer:
    build:
      context: ./trainer
      dockerfile: Dockerfile.prod
    env_file:
      - .env.production.example
    depends_on:
      environment:
        condition: service_healthy
    volumes:
      - ./trainer/models:/app/models
    ports:
      - "${TRAINER_PORT:-8000}:8000"

services:
  nginx:
    build:
      context: ./nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      environment:
        condition: service_healthy
      trainer:
        condition: service_started
      viewer:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  environment:
    build:
      context: ./environment
      dockerfile: Dockerfile.prod
    env_file:
      - .env.production.example
    expose:
      - "3001"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  viewer:
    build:
      context: ./viewer
      dockerfile: Dockerfile.prod
    env_file:
      - .env.production.example
    environment:
      NUXT_PUBLIC_ENVIRONMENT_BASE_URL: /api/environment
      NUXT_PUBLIC_TRAINER_BASE_URL: /api/trainer
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      environment:
        condition: service_healthy
      trainer:
        condition: service_started

  trainer:
    build:
      context: ./trainer
      dockerfile: Dockerfile.prod
    env_file:
      - .env.production.example
    depends_on:
      environment:
        condition: service_healthy
    volumes:
      - ./trainer/models:/app/models
    expose:
      - "8000"
    restart: unless-stopped

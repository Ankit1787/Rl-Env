services:
  # ============================================
  # Environment API
  # ============================================
  - type: web
    name: warehouse-rl-environment
    runtime: docker
    rootDir: warehouse-rl/environment
    dockerfilePath: Dockerfile.prod
    plan: free
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      # Render automatically injects PORT.
      # Your application should listen on process.env.PORT.
      - key: ENVIRONMENT_CORS_ORIGIN
        value: https://warehouse-rl-viewer.onrender.com

      - key: WAREHOUSE_GRID_WIDTH
        value: "4"

      - key: WAREHOUSE_GRID_HEIGHT
        value: "4"

      - key: WAREHOUSE_MAX_STEPS
        value: "10"

      - key: WAREHOUSE_ROBOT_START
        value: "0,0"

      - key: WAREHOUSE_BOX_START
        value: "1,1"

      - key: WAREHOUSE_GOAL_POSITION
        value: "3,3"

      - key: WAREHOUSE_WALLS
        value: ""

      - key: WAREHOUSE_REWARD_STEP
        value: "-1"

      - key: WAREHOUSE_REWARD_INVALID
        value: "-5"

      - key: WAREHOUSE_REWARD_PICKUP
        value: "10"

      - key: WAREHOUSE_REWARD_DELIVERY
        value: "50"

      - key: WAREHOUSE_REWARD_WALL
        value: "-5"

  # ============================================
  # Viewer (Nuxt)
  # ============================================
  - type: web
    name: warehouse-rl-viewer
    runtime: docker
    rootDir: warehouse-rl/viewer
    dockerfilePath: Dockerfile.prod
    plan: free

    envVars:
      - key: NODE_ENV
        value: production

      # Render injects PORT automatically.
      - key: NUXT_PUBLIC_ENVIRONMENT_BASE_URL
        value: https://warehouse-rl-environment.onrender.com

  # ============================================
  # Trainer
  # ============================================
  - type: worker
    name: warehouse-rl-trainer
    runtime: docker
    rootDir: warehouse-rl/trainer
    dockerfilePath: Dockerfile.prod
    plan: free

    envVars:
      - key: ENVIRONMENT_URL
        value: https://warehouse-rl-environment.onrender.com

      - key: PYTHONUNBUFFERED
        value: "1"

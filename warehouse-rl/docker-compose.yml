services:
  environment:
    build:
      context: ./environment
      dockerfile: Dockerfile
    env_file:
      - .env.example
    ports:
      - "${ENVIRONMENT_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5

  trainer:
    build:
      context: ./trainer
      dockerfile: Dockerfile
    env_file:
      - .env.example
    depends_on:
      environment:
        condition: service_healthy
    volumes:
      - ./trainer/models:/app/models
    profiles:
      - trainer

  viewer:
    build:
      context: ./viewer
      dockerfile: Dockerfile
    env_file:
      - .env.example
    environment:
      # This value is consumed by the browser, so it must use the host-facing URL.
      NUXT_PUBLIC_ENVIRONMENT_BASE_URL: http://localhost:${ENVIRONMENT_PORT:-3001}
    ports:
      - "${VIEWER_PORT:-3000}:3000"
    depends_on:
      environment:
        condition: service_healthy
